<body>

    <!-- thẻ img là thẻ tự đóng, không có thẻ đóng -->
    <!-- thuộc tính src: đường dẫn đến hình ảnh -->
    <!-- thuộc tính alt: văn bản thay thế hiển thị khi hình ảnh không tải được -->
    <!-- thuộc tính width: chiều rộng của hình ảnh -->
    <!-- thuộc tính height: chiều cao của hình ảnh -->

    <!-- Thẻ img (Image): sử dụng để chèn hình ảnh vào trang web
                          có thể sử dụng hình ảnh từ URL hoặc từ file trong máy tính
            VD: 
    -->

        <img src="C:\Users\ADMIN\Pictures\o mai gòd.jpg" alt="Anh Ba xỉn" /><br>
        <!-- src (Source Image File): thuộc tính của thẻ img, xác định đường dẫn đến hình ảnh -->
        <!-- alt (Alternative Text): thuộc tính của thẻ img, cung cấp mô tả văn bản cho hình ảnh 
                hiển thị khi hình ảnh không tải được, hỗ trợ đọc màn hình (Screen Reader) cho người khiếm thị
                công cụ tìm kiếm thu nhập dữ liệu trên trang web
        -->
