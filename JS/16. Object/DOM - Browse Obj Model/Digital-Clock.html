<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thời gian thực</title>
</head>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to top left, #fff, #000);
            font-family: Arial, Helvetica, sans-serif;
        }

        .clock-container {
            width: 300px;
            height: 120px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            background-color: rgba(0, 0, 0, 0.4);
        }
        #clock {
            color: #fff;
        }
    </style>
<body>
    <div class="clock-container">
        <div class="clock" id="clock">10:20</div>
    </div>
</body>
    <script src="Digital-Clock.js"></script>
</html>
