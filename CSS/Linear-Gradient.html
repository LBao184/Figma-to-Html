<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inlinear Gradient</title>
</head>
<body>
    <div class="box"></div>
</body>

    <style>
        .box {
            height: 100px ;
            width: 200px ;
            background-image: linear-gradient(to right, #800080, aqua);
        }
    </style> 

     <!-- "to" (theo hướng muốn chuyển màu) To right, left, top, bottom  -->
      <!-- to top left: màu nền chéo từ dưới phải lên trên trái-->
       <!-- to top right: màu nền chéo từ dưới trái lên trên phải -->
</html>
