<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shop Demo — Giao diện Bán Hàng</title>
  <style>
    :root{--bg:#f7fafc;--card:#ffffff;--muted:#6b7280;--accent:#ef4444;--accent-2:#2563eb}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Arial;background:var(--bg);color:#0f172a}
    .wrap{max-width:1200px;margin:18px auto;padding:16px}
    header{display:flex;align-items:center;gap:16px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800}
    h1{margin:0;font-size:20px}
    .lead{color:var(--muted);font-size:13px}

    /* toolbar */
    .toolbar{display:flex;gap:12px;align-items:center;margin-top:14px}
    .search{flex:1;display:flex}
    .search input{flex:1;padding:10px;border-radius:10px;border:1px solid #e6e9f2}
    .filters{display:flex;gap:8px}
    select,button{padding:10px;border-radius:8px;border:1px solid #e6e9f2;background:white}
    button.primary{background:var(--accent);color:white;border:none}

    /* layout */
    .grid{display:grid;grid-template-columns:1fr 320px;gap:18px;margin-top:18px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.cart-panel{order:2}}

    /* product list */
    .products{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    @media(max-width:1000px){.products{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:640px){.products{grid-template-columns:1fr}}
    .card{background:var(--card);padding:12px;border-radius:10px;box-shadow:0 6px 18px rgba(15,23,42,0.06)}
    .product-img{height:160px;background:#f1f5f9;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
    .price{font-weight:700}
    .muted{color:var(--muted)}

    /* cart */
    .cart-panel{width:320px}
    .cart-items{max-height:420px;overflow:auto;margin-top:8px}
    .cart-row{display:flex;gap:8px;align-items:center;padding:8px 0;border-bottom:1px dashed #eef2ff}
    .qty{display:flex;align-items:center;gap:6px}
    .qty button{padding:6px;border-radius:6px;border:1px solid #e6e9f2;background:white}

    .summary{margin-top:12px;padding:12px;border-radius:8px;background:linear-gradient(180deg,#fff, #fbfbfb)}
    .checkout{display:flex;justify-content:space-between;align-items:center;margin-top:8px}

    /* modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(2,6,23,0.4);display:flex;align-items:center;justify-content:center}
    .modal{background:white;border-radius:12px;padding:18px;max-width:600px;width:92%}

    footer{margin-top:18px;text-align:center;color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo">SHOP</div>
        <div>
          <h1>Shop Demo</h1>
          <div class="lead">Giao diện bán hàng: danh mục, tìm kiếm, giỏ hàng, thanh toán (demo)</div>
        </div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
        <div class="muted">Giỏ hàng: <strong id="miniCount">0</strong></div>
        <button id="viewCartBtn" class="primary">Xem giỏ</button>
      </div>
    </header>

    <div class="toolbar">
      <div class="search"><input id="search" placeholder="Tìm sản phẩm, mô tả..." /></div>
      <div class="filters">
        <select id="category">
          <option value="all">Tất cả</option>
          <option value="lights">Đèn</option>
          <option value="chairs">Ghế</option>
          <option value="tables">Bàn</option>
        </select>
        <select id="sort">
          <option value="popular">Phổ biến</option>
          <option value="price_asc">Giá: thấp → cao</option>
          <option value="price_desc">Giá: cao → thấp</option>
        </select>
        <button id="clearFilters">Xóa</button>
      </div>
    </div>

    <main class="grid">
      <section>
        <div id="products" class="products"></div>
      </section>

      <aside class="cart-panel card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:700">Giỏ hàng</div>
          <div class="muted">(<span id="cartCount">0</span> sản phẩm)</div>
        </div>

        <div id="cartItems" class="cart-items"></div>

        <div class="summary">
          <div class="row"><span>Tạm tính</span><strong id="subTotal">₫ 0</strong></div>
          <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
            <input id="coupon" placeholder="Mã khuyến mãi" style="flex:1;padding:8px;border-radius:8px;border:1px solid #e6e9f2" />
            <button id="applyCoupon">Áp dụng</button>
          </div>
          <div class="checkout">
            <div><strong>Tổng</strong></div>
            <div><strong id="total">₫ 0</strong></div>
          </div>
          <div style="margin-top:10px;display:flex;gap:8px">
            <button id="checkoutBtn" class="primary" style="flex:1">Thanh toán</button>
            <button id="clearCart" style="flex:0 0 44px">Xóa</button>
          </div>
        </div>
      </aside>
    </main>

    <footer>Demo shop — muốn tích hợp cổng thanh toán, email xác nhận, hoặc backend API không?</footer>
  </div>

  <!-- modal template -->
  <template id="checkoutTpl">
    <div class="modal-backdrop" role="dialog" aria-modal="true">
      <div class="modal">
        <h3>Thanh toán</h3>
        <div style="margin-top:10px">
          <div class="muted">Nhập thông tin giao hàng</div>
          <div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <input id="c_name" placeholder="Họ & tên" />
            <input id="c_phone" placeholder="Số điện thoại" />
            <input id="c_address" placeholder="Địa chỉ" style="grid-column:span 2" />
            <select id="c_method" style="grid-column:span 2">
              <option value="cod">Thanh toán khi nhận hàng (COD)</option>
              <option value="card">Thẻ/Tài khoản (demo)</option>
            </select>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
          <button id="modalCancel">Hủy</button>
          <button id="modalPay" class="primary">Xác nhận & Thanh toán</button>
        </div>
      </div>
    </div>
  </template>

  <script>
    /* ===== Sample products ===== */
    const PRODUCTS = [
      {id:1,title:'Đèn để bàn Aurora',category:'lights',price:450000,desc:'Đèn LED ấm, thiết kế tối giản',img:''},
      {id:2,title:'Ghế thư giãn Palma',category:'chairs',price:1250000,desc:'Ghế bọc vải, thoải mái',img:''},
      {id:3,title:'Bàn café Mino',category:'tables',price:980000,desc:'Bàn gỗ sồi nhỏ gọn',img:''},
      {id:4,title:'Đèn trần Halo',category:'lights',price:760000,desc:'Đèn trang trí hiện đại',img:''},
      {id:5,title:'Ghế ăn Vela',category:'chairs',price:420000,desc:'Ghế gọn, dễ vệ sinh',img:''},
      {id:6,title:'Bàn làm việc Orion',category:'tables',price:2100000,desc:'Bàn lớn, nhiều ngăn',img:''}
    ];

    /* ===== Utilities ===== */
    const qs = s => document.querySelector(s);
    const formatVND = n => '₫ ' + Number(n).toLocaleString('vi-VN');

    /* ===== Rendering products ===== */
    function renderProducts(list){
      const wrap = qs('#products'); wrap.innerHTML='';
      list.forEach(p => {
        const card = document.createElement('div'); card.className='card';
        card.innerHTML = `
          <div class="product-img"> <div style="text-align:center"><strong>${p.title.split(' ')[0]}</strong></div></div>
          <div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:700">${p.title}</div><div class="muted">${p.category}</div></div>
          <div class="muted" style="font-size:13px;margin-top:6px">${p.desc}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px"><div class="price">${formatVND(p.price)}</div><button data-id="${p.id}" class="addBtn">Thêm</button></div>
        `;
        wrap.appendChild(card);
      });
      // bind add buttons
      document.querySelectorAll('.addBtn').forEach(b=>b.addEventListener('click', ()=>{ addToCart(Number(b.dataset.id)); }));
    }

    /* ===== Cart state (localStorage) ===== */
    const CART_KEY = 'demo_shop_cart_v1';
    let CART = {}; // id -> qty
    function loadCart(){ try{ const raw = localStorage.getItem(CART_KEY); if(raw) CART = JSON.parse(raw); else CART = {}; }catch(e){CART={};} updateCartUI(); }
    function saveCart(){ localStorage.setItem(CART_KEY, JSON.stringify(CART)); updateCartUI(); }

    function addToCart(id,qty=1){ CART[id] = (CART[id]||0)+qty; saveCart(); alert('Đã thêm vào giỏ'); }
    function removeFromCart(id){ delete CART[id]; saveCart(); }
    function setQty(id,qty){ if(qty<=0) removeFromCart(id); else CART[id]=qty; saveCart(); }

    function cartItemsDetailed(){
      return Object.keys(CART).map(id=>{
        const p = PRODUCTS.find(x=>x.id===Number(id)); return {...p, qty:CART[id]};
      });
    }

    function calcSubTotal(){ return cartItemsDetailed().reduce((s,it)=>s+it.price*it.qty,0); }

    /* ===== Render cart UI ===== */
    function updateCartUI(){
      const itemsEl = qs('#cartItems'); itemsEl.innerHTML='';
      const items = cartItemsDetailed();
      qs('#cartCount').textContent = items.reduce((s,it)=>s+it.qty,0);
      qs('#miniCount').textContent = qs('#cartCount').textContent;
      if(items.length===0){ itemsEl.innerHTML='<div class="muted" style="padding:12px">Giỏ hàng trống</div>'; qs('#subTotal').textContent = formatVND(0); qs('#total').textContent = formatVND(0); return; }
      items.forEach(it=>{
        const row = document.createElement('div'); row.className='cart-row';
        row.innerHTML = `
          <div style="flex:1">
            <div style="font-weight:700">${it.title}</div>
            <div class="muted" style="font-size:13px">${formatVND(it.price)}</div>
          </div>
          <div style="text-align:right">
            <div class="qty">
              <button data-id="${it.id}" class="dec">-</button>
              <div>${it.qty}</div>
              <button data-id="${it.id}" class="inc">+</button>
            </div>
            <div style="margin-top:6px"><button data-id="${it.id}" class="remove">Xóa</button></div>
          </div>
        `;
        itemsEl.appendChild(row);
      });
      // bind qty controls
      itemsEl.querySelectorAll('.inc').forEach(b=>b.addEventListener('click', ()=>{ const id=b.dataset.id; setQty(id, CART[id]*1+1); }));
      itemsEl.querySelectorAll('.dec').forEach(b=>b.addEventListener('click', ()=>{ const id=b.dataset.id; setQty(id, CART[id]*1-1); }));
      itemsEl.querySelectorAll('.remove').forEach(b=>b.addEventListener('click', ()=>{ if(confirm('Xóa sản phẩm?')){ removeFromCart(b.dataset.id); } }));

      const sub = calcSubTotal(); qs('#subTotal').textContent = formatVND(sub);
      const total = applyCouponToTotal(sub); qs('#total').textContent = formatVND(total);
    }

    /* ===== Filters, search, sort ===== */
    function applyFilters(){
      const q = qs('#search').value.trim().toLowerCase();
      const cat = qs('#category').value; const sort = qs('#sort').value;
      let list = PRODUCTS.filter(p=> (cat==='all'||p.category===cat) && (p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q)) );
      if(sort==='price_asc') list.sort((a,b)=>a.price-b.price);
      if(sort==='price_desc') list.sort((a,b)=>b.price-a.price);
      renderProducts(list);
    }

    qs('#search').addEventListener('input', ()=>applyFilters());
    qs('#category').addEventListener('change', ()=>applyFilters());
    qs('#sort').addEventListener('change', ()=>applyFilters());
    qs('#clearFilters').addEventListener('click', ()=>{ qs('#search').value=''; qs('#category').value='all'; qs('#sort').value='popular'; applyFilters(); });

    /* ===== Coupons (simple) ===== */
    let ACTIVE_COUPON = null; // {code, type:'percent'|'fixed',value}
    const COUPONS = { 'SALE10':{type:'percent',value:10}, 'OFF100000':{type:'fixed',value:100000} };
    qs('#applyCoupon').addEventListener('click', ()=>{
      const code = qs('#coupon').value.trim().toUpperCase(); if(!code){ alert('Nhập mã'); return; }
      if(COUPONS[code]){ ACTIVE_COUPON = {...COUPONS[code],code}; alert('Áp dụng mã '+code); saveCart(); updateCartUI(); } else { alert('Mã không hợp lệ'); }
    });

    function applyCouponToTotal(sub){ if(!ACTIVE_COUPON) return sub; if(ACTIVE_COUPON.type==='percent'){ return Math.max(0, Math.round(sub*(1 - ACTIVE_COUPON.value/100))); } return Math.max(0, sub - ACTIVE_COUPON.value); }

    /* ===== Checkout modal & simulate order ===== */
    qs('#checkoutBtn').addEventListener('click', ()=>{
      if(Object.keys(CART).length===0){ alert('Giỏ hàng rỗng'); return; }
      showModal();
    });

    qs('#viewCartBtn').addEventListener('click', ()=>{ window.scrollTo({top:document.querySelector('.cart-panel').offsetTop, behavior:'smooth'}); });

    function showModal(){ const tpl = qs('#checkoutTpl'); const node = tpl.content.cloneNode(true); document.body.appendChild(node);
      const backdrop = document.querySelector('.modal-backdrop');
      document.getElementById('modalCancel').addEventListener('click', ()=>backdrop.remove());
      document.getElementById('modalPay').addEventListener('click', ()=>{ submitOrder(); backdrop.remove(); });
      backdrop.addEventListener('click', e=>{ if(e.target===backdrop) backdrop.remove(); });
    }

    function submitOrder(){
      // basic validation (demo)
      const c_name = qs('#c_name')?.value || '';
      if(!c_name){ alert('Nhập họ tên'); return; }
      // simulate sending
      const order = { id:'ORD'+Math.floor(Math.random()*90000+10000), items:cartItemsDetailed(), total:applyCouponToTotal(calcSubTotal()), customer:{name:qs('#c_name').value, phone:qs('#c_phone').value, address:qs('#c_address').value} };
      console.log('Order sent (demo):', order);
      alert('Đặt hàng thành công! Mã: '+order.id);
      CART = {}; ACTIVE_COUPON = null; saveCart(); updateCartUI();
    }

    qs('#clearCart').addEventListener('click', ()=>{ if(confirm('Xóa toàn bộ giỏ hàng?')){ CART={}; ACTIVE_COUPON=null; saveCart(); updateCartUI(); } });

    /* ===== Persistence ===== */
    function init(){ renderProducts(PRODUCTS); loadCart(); applyFilters(); }
    init();

  </script>
</body>
</html>
